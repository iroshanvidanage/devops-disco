---

lookup_options:
  # This is a global lookup option that applies to all lookups.
  # It specifies that if a key is not found, it should return 'undefined' instead of throwing an error.
  # This can be useful for optional keys or when you want to handle missing keys gracefully.
  '*':
    default: 'undefined'
  apache::sites:
    merge: deep

greeting: "Hello, World!"

motd::content: |
  Welcome to the server %{ facts.networking.fqdn }!

  This server is managed by knikx industries. Please contact support if you have any issues.
  This server is running in %{ facts.datacenter } datacenter.

# variables interpolation
webserver::listen: "%{ facts.networking.ip }:8080"

# function interpolation
nameservers:
  - "ns1.example.com"
  - "ns2.example.com"

# alias function interpolation
resolv::dns: "alias(%{'nameservers'})"

users:
  - "alice"
  - "bob"
  - "charlie"
  - "dave"
  - "eve"
  - "frank"

sysadmins: "%{ alias('users') }"

##############################################################
# domain: "example.com"

# Using alias with a map
website: "alias(%{'domain'})" ==> 
# - Here, alias() is being called directly with a map reference (%{}).
website: "example.com"

# Using interpolation
site: "%{ alias('domain') }"  ==> 
# Here, interpolation is used inside a map literal. - The result of alias('domain') is placed into the map.
site:
  "example.com"
# This creates a map with a key named  and no value, which is very different from just substituting the string.
##############################################################

# lookup function
sitename: "knikx.com"
siteurl: "https://%{ facts.datacenter }.%{ lookup('sitename') }"


apache::sites:
  knikx:
    port: 443
    documentroot: "/var/www/knikx"
    serveradmin: "admin@knikx.com"
  example:
    port: 80
    documentroot: "/var/www/example"
    serveradmin: "example@knikx.com"
  intra:
    port: 80
    documentroot: "/var/www/intra"
    serveradmin: "intra@knikx.com"