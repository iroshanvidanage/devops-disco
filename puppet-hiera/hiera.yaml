---

version: 5

defaults:
  datadir: data
  data_hash: yaml_data

hierarchy:
  - name: "Per-node data"
    path: "nodes/%{ facts.networking.fqdn }.yaml"
  - name: "Per-role data"
    path: "roles/%{ facts.role }.yaml"
  - name: "OS-specific data"
    path: "os/%{ facts.os.family }.yaml"
  - name: "Global data"
    path: "common.yaml"